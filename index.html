<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Olma Bot</title>
    <link rel="stylesheet" href="assets/scan.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <p class="eyebrow" id="eyebrow">Olma Bot</p>
        <h1 id="title"></h1>
        <p class="description" id="description"></p>

        <div class="actions">
          <button id="startButton" class="primary"></button>
          <button id="closeButton" class="secondary"></button>
        </div>

        <div class="manual">
          <label for="manualInput" id="manualLabel"></label>
          <textarea id="manualInput" rows="3"></textarea>
          <button id="manualSubmit" class="secondary"></button>
        </div>

        <p class="status" id="status"></p>
      </section>
    </main>

    <script type="module" src="assets/scan.js?v=2"></script>
  </body>
</html>
